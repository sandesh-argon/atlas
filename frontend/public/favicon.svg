<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Lines from center to outer nodes -->
  <line x1="8" y1="8" x2="8" y2="2.5" stroke="#2DD4BF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="8" x2="2.8" y2="11.5" stroke="#2DD4BF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="8" x2="13.2" y2="11.5" stroke="#2DD4BF" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Outer nodes -->
  <circle cx="8" cy="2.5" r="1.5" fill="#2DD4BF"/>
  <circle cx="2.8" cy="11.5" r="1.5" fill="#2DD4BF"/>
  <circle cx="13.2" cy="11.5" r="1.5" fill="#2DD4BF"/>
  
  <!-- Center node -->
  <circle cx="8" cy="8" r="2" fill="none" stroke="#2DD4BF" stroke-width="1.2"/>
  <circle cx="8" cy="8" r="0.8" fill="#2DD4BF"/>
</svg>
